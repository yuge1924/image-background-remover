<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超级马里奥兄弟 - 第1-1关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#1a0a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;font-family:"Microsoft YaHei","SimHei",sans-serif}
#wrap{position:relative;display:inline-block;box-shadow:0 0 60px rgba(100,150,255,0.5),0 0 120px rgba(100,150,255,0.2)}
#hud{background:linear-gradient(180deg,#000 0%,#111 100%);color:#fff;width:100%;padding:7px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #333}
.hi{text-align:center;line-height:1.7}
.hl{font-size:10px;color:#888;letter-spacing:1px;text-transform:uppercase}
.hv{font-size:15px;font-weight:bold;letter-spacing:2px}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;cursor:default}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hi"><div class="hl">马里奥</div><div class="hv" id="score">000000</div></div>
    <div class="hi"><div class="hl">🪙 金币</div><div class="hv" id="coins">×00</div></div>
    <div class="hi"><div class="hl">关卡</div><div class="hv">1-1</div></div>
    <div class="hi"><div class="hl">时间</div><div class="hv" id="timer">400</div></div>
    <div class="hi"><div class="hl">生命</div><div class="hv" id="lives">♥×3</div></div>
  </div>
  <canvas id="c"></canvas>
</div>
<script>

// =====================================================
// 超级马里奥兄弟 重制版 - 3D动漫风格
// =====================================================
const CV = document.getElementById('c');
const cx = CV.getContext('2d');

// 自适应尺寸
const TILE = 16;
const SC = Math.max(2, Math.min(4, Math.floor(Math.min(window.innerWidth/256, (window.innerHeight-60)/224))));
const T = TILE * SC;          // 每格像素
const SW = 16 * T;            // 屏幕宽
const SH = 14 * T;            // 屏幕高
CV.width = SW; CV.height = SH;
document.getElementById('hud').style.width = SW + 'px';

// 色板 - 3D动漫风
const P = {
  // 天空
  sky0:'#1a6fff', sky1:'#5cb8ff', sky2:'#a8e4ff',
  // 地面 3D感
  gTop:'#f5c842', gMid:'#d4860a', gBot:'#8b4500', gLine:'#5a2800',
  gHi:'#ffe87a', gShadow:'#a05000',
  // 砖块
  bk:'#d4680a', bkHi:'#f5a030', bkSh:'#7a3000', bkMt:'#5a2000',
  // 问号块
  qy:'#f5c000', qHi:'#ffe060', qSh:'#a07000', qDk:'#7a4800',
  // 用过的块
  ub:'#8a6020', ubHi:'#b08040', ubSh:'#4a3010',
  // 水管 3D
  pg:'#00c800', pgHi:'#60ff60', pgSh:'#006000', pgDk:'#004000',
  // 马里奥
  mR:'#ff2060', mRHi:'#ff80a0', mRSh:'#a00030',
  mSk:'#ffb890', mSkHi:'#ffd8c0', mSkSh:'#c07050',
  mBl:'#0040ff', mBlHi:'#4080ff', mBlSh:'#002080',
  mBr:'#804000', mBrHi:'#c06020',
  mEy:'#000000', mWh:'#ffffff',
  // 栗宝宝
  gb:'#c85000', gbHi:'#f08030', gbSh:'#602000',
  gbEy:'#ffb890', gbPu:'#200000',
  // 金币
  co:'#ffd700', coHi:'#fff080', coSh:'#c08000', coRim:'#ff9000',
  // 蘑菇
  muR:'#ff2020', muHi:'#ff8080', muSh:'#800000',
  muW:'#ffffff', muSk:'#ffb890',
  // 旗杆
  fp:'#c0c0c0', fpHi:'#ffffff', fpSh:'#606060',
  flg:'#00c800', flgHi:'#60ff60',
  // 云
  cl:'#ffffff', clHi:'#e0f0ff', clSh:'#b0c8e0',
  // 山丘
  hl:'#00a000', hlHi:'#40d040', hlSh:'#005000',
  // 星星/粒子
  st:'#ffff00', stHi:'#ffffff',
};

// =====================================================
// 音效
// =====================================================
let AC = null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function tone(f,tp,d,v=0.25,f0=null){
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=tp;
  if(f0){o.frequency.setValueAtTime(f0,a.currentTime);o.frequency.exponentialRampToValueAtTime(f,a.currentTime+d);}
  else o.frequency.setValueAtTime(f,a.currentTime);
  g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const SFX={
  jump:()=>tone(650,'square',0.18,0.28,280),
  coin:()=>{tone(1300,'square',0.07,0.18);setTimeout(()=>tone(1700,'square',0.09,0.18),70);},
  stomp:()=>tone(160,'square',0.13,0.38,320),
  pu:()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.11,0.22),i*85)),
  die:()=>{tone(480,'square',0.09,0.28);setTimeout(()=>tone(320,'square',0.14,0.28),110);setTimeout(()=>tone(180,'square',0.28,0.28),260);},
  bump:()=>tone(130,'square',0.07,0.28),
  flag:()=>[784,659,523,392,330,262].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.16,0.22),i*100)),
  up:()=>[523,659,784,1047,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'square',0.09,0.22),i*70)),
};

// =====================================================
// 关卡地图
// =====================================================
const LW=212, LH=14;
const MAP=Array.from({length:LH},()=>new Uint8Array(LW));
// 0空 1地 2砖 3问号 4管顶L 5管顶R 6管身L 7管身R 8用过 9多币问号 10台阶

function gnd(x1,x2){for(let x=x1;x<=x2;x++){MAP[12][x]=1;MAP[13][x]=1;}}
gnd(0,68);gnd(71,85);gnd(87,210);

function pip(col,h){
  MAP[12-h][col]=4;MAP[12-h][col+1]=5;
  for(let r=13-h;r<=11;r++){MAP[r][col]=6;MAP[r][col+1]=7;}
}
pip(28,2);pip(38,3);pip(46,4);pip(57,4);

// 问号块和砖块 (第1-1关原版布局)
MAP[7][16]=3;MAP[7][19]=9;MAP[7][20]=2;MAP[7][21]=3;MAP[7][22]=2;
MAP[3][24]=2;MAP[3][25]=2;MAP[3][26]=2;MAP[3][27]=3;MAP[3][28]=2;MAP[3][29]=2;MAP[3][30]=2;
MAP[7][77]=2;MAP[7][78]=2;MAP[7][79]=2;MAP[7][80]=3;
MAP[3][80]=3;
// 中段砖块和问号
for(let x=88;x<=197;x++){
  if(x%17===0)MAP[7][x]=3;
  else if(x%11===0)MAP[7][x]=2;
  else if(x%23===0)MAP[3][x]=3;
}
// 台阶
for(let s=0;s<8;s++)for(let r=13;r>=13-s;r--)MAP[r][198+s]=10;
for(let s=0;s<8;s++)for(let r=13;r>=13-s;r--)MAP[r][207-s]=10;

// =====================================================
// 游戏对象
// =====================================================
const qHit={}, coins=[], enemies=[], powerups=[], particles=[];

// 金币 - 放在可到达的位置（行走路径上方1-3格）
const coinRows=[9,10,11]; // 可到达的行
for(let x=5;x<LW-5;x++){
  for(const row of coinRows){
    if(MAP[row][x]===0&&MAP[row+1][x]===0&&MAP[row-1][x]===0){
      if(Math.random()<0.06){
        coins.push({x:x*T+T/2,y:row*T+T/2,got:false,anim:Math.random()*Math.PI*2});
      }
    }
  }
}
// 额外在砖块上方放金币
[[17,6],[18,6],[20,6],[25,2],[26,2],[28,2],[78,6],[79,6],[90,6],[100,6],[110,6],[120,6],[130,6],[140,6],[150,6],[160,6],[170,6],[180,6]].forEach(([x,y])=>{
  coins.push({x:x*T+T/2,y:y*T+T/2,got:false,anim:Math.random()*Math.PI*2});
});

function mkGoomba(tx){
  enemies.push({type:'g',x:tx*T,y:11*T,vx:-1.4,vy:0,w:T,h:T,dead:false,squish:false,dT:0,onG:false});
}
[22,37,39,50,57,63,78,90,100,110,120,130,140,150,160,170,180].forEach(mkGoomba);

const FLAG={x:198*T,topY:1*T,h:12*T};

// =====================================================
// 马里奥
// =====================================================
function mkMario(){return{
  x:3*T,y:10*T,vx:0,vy:0,w:T*0.85,h:T,
  onG:false,face:1,big:false,
  dead:false,dT:0,inv:0,
  wF:0,wT:0,jumping:false,sliding:false,
};}
let M=mkMario();

// =====================================================
// 游戏状态
// =====================================================
let score=0,coinN=0,lives=3,timeL=400,timeA=0;
let cam={x:0};
let state='title';
let tick=0;

// =====================================================
// 输入
// =====================================================
const K={};
window.addEventListener('keydown',e=>{
  K[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(state==='title'&&(e.code==='Space'||e.code==='Enter'))startGame();
  if((state==='gameover'||state==='win')&&(e.code==='Space'||e.code==='Enter'))resetAll();
});
window.addEventListener('keyup',e=>{K[e.code]=false;});

// =====================================================
// 碰撞检测
// =====================================================
function solid(t){return t>=1&&t<=10;}
function tAt(tx,ty){
  if(tx<0||ty<0||tx>=LW||ty>=LH)return ty>=LH?1:0;
  return MAP[ty][tx];
}
function collide(o){
  const mg=1;
  o.onG=false;
  // 下
  if(o.vy>=0){
    const row=Math.floor((o.y+o.h)/T);
    for(let c=Math.floor((o.x+mg)/T);c<=Math.floor((o.x+o.w-mg)/T);c++){
      if(solid(tAt(c,row))){o.y=row*T-o.h;o.vy=0;o.onG=true;break;}
    }
  }
  // 上
  if(o.vy<0){
    const row=Math.floor(o.y/T);
    for(let c=Math.floor((o.x+mg)/T);c<=Math.floor((o.x+o.w-mg)/T);c++){
      if(solid(tAt(c,row))){o.y=(row+1)*T;if(o===M)hitBlk(c,row);o.vy=0;break;}
    }
  }
  // 左
  if(o.vx<0){
    const col=Math.floor((o.x+mg)/T);
    for(let r=Math.floor((o.y+mg)/T);r<=Math.floor((o.y+o.h-mg)/T);r++){
      if(solid(tAt(col,r))){o.x=(col+1)*T-mg;o.vx=0;break;}
    }
  }
  // 右
  if(o.vx>0){
    const col=Math.floor((o.x+o.w-mg)/T);
    for(let r=Math.floor((o.y+mg)/T);r<=Math.floor((o.y+o.h-mg)/T);r++){
      if(solid(tAt(col,r))){o.x=col*T-o.w+mg;o.vx=0;break;}
    }
  }
}

function hitBlk(tx,ty){
  const t=tAt(tx,ty), k=`${tx},${ty}`;
  if(t===2){
    if(M.big){
      MAP[ty][tx]=0;
      for(let i=0;i<10;i++){
        const a=(i/10)*Math.PI*2;
        addPart(tx*T+T/2,ty*T+T/2,Math.cos(a)*3.5+Math.random()*2,Math.sin(a)*3.5-3,P.bk,28,'brick');
      }
      addScore(50);
    }
    SFX.bump();
    // 撞击动画
    addPart(tx*T+T/2,ty*T-4,0,-2,P.bkHi,8,'bump');
  } else if((t===3||t===9)&&!qHit[k]){
    qHit[k]=true;MAP[ty][tx]=8;
    if(t===9||Math.random()<0.3){
      addCoin();
      addPart(tx*T+T/2,ty*T,0,-7,P.co,22,'coin');
    } else {
      powerups.push({x:tx*T,y:(ty-1)*T,vx:1.8,vy:0,w:T,h:T,onG:false,got:false});
      SFX.pu();
    }
    addScore(100);SFX.bump();
  }
}

function addScore(n){
  score+=n;
  document.getElementById('score').textContent=String(score).padStart(6,'0');
}
function addCoin(){
  coinN++;addScore(200);SFX.coin();
  document.getElementById('coins').textContent='×'+String(coinN).padStart(2,'0');
  if(coinN>=100){coinN=0;lives++;SFX.up();document.getElementById('lives').textContent='♥×'+lives;}
}
function addPart(x,y,vx,vy,col,life,type=''){
  particles.push({x,y,vx,vy,col,life,maxL:life,type,r:Math.random()*Math.PI*2});
}

// =====================================================
// 更新马里奥
// =====================================================
function updMario(){
  if(M.dead){
    M.dT--;M.vy+=0.38;M.y+=M.vy;
    if(M.dT<=0){
      lives--;document.getElementById('lives').textContent='♥×'+lives;
      if(lives<=0){state='gameover';}else{M=mkMario();state='playing';cam.x=0;}
    }
    return;
  }
  if(M.sliding){
    M.y+=2.8;
    if(M.y>=11*T){M.sliding=false;state='win';SFX.flag();}
    return;
  }
  if(M.inv>0)M.inv--;

  const run=K['ShiftLeft']||K['ShiftRight']||K['KeyZ']||K['KeyX'];
  const maxV=run?6:4;
  const acc=M.onG?0.6:0.32;

  if(K['ArrowLeft']||K['KeyA']){M.vx-=acc;M.face=-1;}
  else if(K['ArrowRight']||K['KeyD']){M.vx+=acc;M.face=1;}
  else M.vx*=(M.onG?0.75:0.9);
  if(Math.abs(M.vx)<0.08)M.vx=0;
  M.vx=Math.max(-maxV,Math.min(maxV,M.vx));

  // 跳跃 - 大幅提升跳跃力
  if((K['Space']||K['ArrowUp']||K['KeyW'])&&M.onG&&!M.jumping){
    M.vy = M.big ? -13.5 : -13;  // 提升跳跃高度
    M.jumping=true;M.onG=false;SFX.jump();
  }
  if(!(K['Space']||K['ArrowUp']||K['KeyW']))M.jumping=false;
  // 长按跳更高
  if(M.jumping&&M.vy<-5&&(K['Space']||K['ArrowUp']||K['KeyW']))M.vy-=0.15;
  // 松键减速
  if(M.jumping&&M.vy<-3&&!(K['Space']||K['ArrowUp']||K['KeyW']))M.vy*=0.88;

  M.vy=Math.min(M.vy+0.52,14);
  M.x+=M.vx;M.y+=M.vy;
  if(M.x<0)M.x=0;
  if(M.x>(LW-2)*T)M.x=(LW-2)*T;
  collide(M);

  if(M.y>SH+200)killM();

  // 行走动画
  if(M.onG&&Math.abs(M.vx)>0.3){
    M.wT++;
    if(M.wT>Math.max(2,9-Math.abs(M.vx))){M.wF=(M.wF+1)%4;M.wT=0;}
  } else if(M.onG)M.wF=0;

  // 摄像机
  const tgt=M.x-SW*0.38;
  cam.x=Math.max(cam.x,Math.max(0,Math.min(tgt,(LW*T)-SW)));

  // 收金币
  coins.forEach(co=>{
    if(co.got)return;
    if(Math.abs(M.x+M.w/2-co.x)<T*0.9&&Math.abs(M.y+M.h/2-co.y)<T*0.9){
      co.got=true;addCoin();
      addPart(co.x,co.y,0,-5,P.co,18,'coin');
    }
  });

  // 收道具
  powerups.forEach(pu=>{
    if(pu.got)return;
    if(M.x<pu.x+pu.w&&M.x+M.w>pu.x&&M.y<pu.y+pu.h&&M.y+M.h>pu.y){
      pu.got=true;
      if(!M.big){M.big=true;M.h=T*2;M.y-=T;}
      addScore(1000);SFX.pu();
      for(let i=0;i<12;i++)addPart(pu.x+T/2,pu.y+T/2,(Math.random()-0.5)*6,Math.random()*-6,P.muR,20,'star');
    }
  });

  // 敌人碰撞
  if(M.inv<=0){
    enemies.forEach(e=>{
      if(e.dead)return;
      if(M.x+3<e.x+e.w&&M.x+M.w-3>e.x&&M.y<e.y+e.h&&M.y+M.h>e.y){
        if(M.vy>0&&M.y+M.h<e.y+e.h*0.55){
          e.squish=true;e.dead=true;e.dT=28;
          M.vy=-8;addScore(100);SFX.stomp();
          for(let i=0;i<8;i++)addPart(e.x+T/2,e.y,(Math.random()-0.5)*5,-Math.random()*4,P.gb,16,'star');
        } else {
          if(M.big){M.big=false;M.h=T;M.inv=130;SFX.die();}
          else killM();
        }
      }
    });
  }

  // 旗杆
  if(!M.sliding&&M.x+M.w>FLAG.x&&M.x<FLAG.x+10){
    M.sliding=true;M.vx=0;M.vy=0;M.x=FLAG.x-M.w;addScore(500);
    for(let i=0;i<20;i++)addPart(FLAG.x,FLAG.topY+Math.random()*FLAG.h,(Math.random()-0.5)*4,-Math.random()*3,P.flg,30,'star');
  }
}

function killM(){
  if(M.dead)return;
  M.dead=true;M.dT=140;M.vy=-12;M.vx=0;SFX.die();
  for(let i=0;i<15;i++)addPart(M.x+M.w/2,M.y+M.h/2,(Math.random()-0.5)*8,-Math.random()*8,P.mR,25,'star');
}

// =====================================================
// 更新敌人/道具/粒子
// =====================================================
function updEnemies(){
  enemies.forEach(e=>{
    if(e.dead){if(e.dT>0)e.dT--;return;}
    e.vy=Math.min(e.vy+0.5,12);
    e.x+=e.vx;e.y+=e.vy;
    collide(e);
    if(e.vx===0)e.vx*=-1||(-1.4);
    if(e.y>SH+100){e.dead=true;return;}
    const ex=e.vx<0?Math.floor(e.x/T):Math.floor((e.x+e.w)/T);
    if(!solid(tAt(ex,Math.floor((e.y+e.h+2)/T))))e.vx*=-1;
  });
}
function updPU(){
  powerups.forEach(pu=>{
    if(pu.got)return;
    pu.vy=Math.min(pu.vy+0.42,10);
    pu.x+=pu.vx;pu.y+=pu.vy;
    collide(pu);
    if(pu.vx===0)pu.vx=1.8;
    if(pu.y>SH+100)pu.got=true;
  });
}
function updParts(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.type!=='bump')p.vy+=0.28;
    p.vx*=0.97;
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// =====================================================
// 绘制工具
// =====================================================
function sx(wx){return Math.round(wx-cam.x);}
function fr(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(Math.round(x),Math.round(y),w,h);}
// 3D块效果
function block3d(x,y,w,h,top,mid,bot,hi,sh){
  fr(x,y,w,h,mid);
  fr(x,y,w,3,hi);       // 顶高光
  fr(x,y,3,h,hi);       // 左高光
  fr(x,y+h-3,w,3,sh);   // 底阴影
  fr(x+w-3,y,3,h,sh);   // 右阴影
  fr(x+1,y+1,w-2,2,top);
}
// 圆角矩形
function rr(x,y,w,h,r,c){
  cx.fillStyle=c;cx.beginPath();
  cx.roundRect(x,y,w,h,r);cx.fill();
}

// =====================================================
// 绘制背景
// =====================================================
function drawBG(){
  // 天空渐变
  const g=cx.createLinearGradient(0,0,0,SH);
  g.addColorStop(0,'#0a3aaa');
  g.addColorStop(0.4,'#1a6fff');
  g.addColorStop(0.8,'#5cb8ff');
  g.addColorStop(1,'#a8e4ff');
  cx.fillStyle=g;cx.fillRect(0,0,SW,SH);

  // 远景山丘（带3D感）
  const hills=[0,14,28,42,56,70,84,98,112,126,140,154,168,182,196];
  hills.forEach((hx,i)=>{
    const wx=hx*T-cam.x*0.3; // 视差
    if(wx<-T*8||wx>SW+T*8)return;
    const big=i%3!==1;
    const bh=big?T*4:T*2.5;
    const bw=big?T*6:T*4;
    const by=SH-T*2-bh+T*0.5;
    // 山体
    cx.fillStyle=P.hl;
    cx.beginPath();cx.ellipse(wx+bw/2,by+bh,bw/2,bh,0,Math.PI,0);cx.fill();
    // 高光
    cx.fillStyle=P.hlHi;
    cx.beginPath();cx.ellipse(wx+bw*0.35,by+bh*0.6,bw*0.15,bh*0.3,0,Math.PI,0);cx.fill();
    // 阴影
    cx.fillStyle=P.hlSh;
    cx.beginPath();cx.ellipse(wx+bw*0.7,by+bh*0.8,bw*0.2,bh*0.35,0,Math.PI,0);cx.fill();
  });

  // 云朵（带3D感）
  const clouds=[2,15,30,45,60,75,90,105,120,135,150,165,180,195];
  clouds.forEach((cx2,i)=>{
    const wx=cx2*T-cam.x*0.6; // 视差
    if(wx<-T*6||wx>SW+T*6)return;
    const cy=(i%3===0)?T*1.5:(i%3===1)?T*2.5:T*1;
    const cw=(i%3===0)?3:(i%3===1)?2:2.5;
    drawCloud3D(wx,cy,cw);
  });
}

function drawCloud3D(x,y,size){
  const s=T*size;
  // 阴影
  cx.fillStyle='rgba(100,140,200,0.25)';
  cx.beginPath();cx.ellipse(x+s/2+4,y+T*0.9+4,s/2,T*0.35,0,0,Math.PI*2);cx.fill();
  // 主体
  cx.fillStyle=P.cl;
  cx.fillRect(x,y+T*0.5,s,T*0.7);
  [[0.18,0.5,0.52],[0.5,0.18,0.72],[0.82,0.45,0.5]].forEach(([rx,ry,r])=>{
    cx.beginPath();cx.arc(x+s*rx,y+T*ry,T*r,Math.PI,0);cx.fill();
  });
  // 高光
  cx.fillStyle=P.clHi;
  cx.fillRect(x+4,y+T*0.5,s-8,4);
  cx.beginPath();cx.arc(x+s*0.5,y+T*0.18,T*0.4,Math.PI,0);cx.fill();
  // 底部阴影
  cx.fillStyle=P.clSh;
  cx.fillRect(x+2,y+T*0.5+T*0.7-4,s-4,4);
}

// =====================================================
// 绘制地块
// =====================================================
function drawTile(tx,ty){
  const t=MAP[ty][tx];if(!t)return;
  const x=sx(tx*T),y=ty*T;
  if(x<-T||x>SW+T)return;

  switch(t){
    case 1:{ // 地面 3D
      // 主体
      fr(x,y,T,T,P.gMid);
      // 顶面（亮）
      fr(x,y,T,T*0.3,P.gTop);
      fr(x,y,T,3,P.gHi);
      // 左高光
      fr(x,y,3,T,P.gHi);
      // 底阴影
      fr(x,y+T-3,T,3,P.gBot);
      // 右阴影
      fr(x+T-3,y,3,T,P.gShadow);
      // 纹理线
      cx.fillStyle=P.gLine;
      cx.fillRect(x,y+T*0.3,T,2);
      cx.fillRect(x+T/2,y+T*0.3+2,2,T*0.7-2);
      break;}
    case 2:{ // 砖块 3D
      block3d(x,y,T,T,P.bkHi,P.bk,P.bkSh,P.bkHi,P.bkSh);
      // 砖缝
      cx.fillStyle=P.bkMt;
      cx.fillRect(x+2,y+T/2-1,T-4,2);
      cx.fillRect(x+T/2-1,y+2,2,T/2-3);
      cx.fillRect(x+T/4-1,y+T/2+1,2,T/2-3);
      cx.fillRect(x+3*T/4-1,y+T/2+1,2,T/2-3);
      break;}
    case 3:case 9:{ // 问号块 3D动画
      const b=Math.sin(tick*0.09)*1.8;
      block3d(x,y+b,T,T,P.qHi,P.qy,P.qSh,P.qHi,P.qDk);
      // ? 号
      cx.fillStyle=P.qDk;
      cx.font=`bold ${T*0.55}px monospace`;
      cx.textAlign='center';
      cx.fillText('?',x+T/2+1,y+T*0.73+b+1);
      cx.fillStyle=P.mWh;
      cx.fillText('?',x+T/2,y+T*0.72+b);
      break;}
    case 8:{ // 用过的块
      block3d(x,y,T,T,P.ubHi,P.ub,P.ubSh,P.ubHi,P.ubSh);
      break;}
    case 4:{ // 管顶左 3D
      fr(x-2,y,T+2,T,P.pg);
      fr(x-2,y,T+2,4,P.pgHi);
      fr(x-2,y,4,T,P.pgHi);
      fr(x-2+T-2,y,4,T,P.pgSh);
      fr(x-2,y+T-4,T+2,4,P.pgDk);
      fr(x+4,y+4,T-10,T-4,P.pg);
      fr(x+4,y+4,6,T-4,P.pgHi);
      break;}
    case 5:{ // 管顶右 3D
      fr(x,y,T+2,T,P.pg);
      fr(x,y,T+2,4,P.pgHi);
      fr(x+T-2,y,4,T,P.pgSh);
      fr(x,y+T-4,T+2,4,P.pgDk);
      fr(x+2,y+4,T-8,T-4,P.pg);
      fr(x+T-8,y+4,6,T-4,P.pgSh);
      break;}
    case 6:{ // 管身左 3D
      fr(x,y,T,T,P.pg);
      fr(x,y,6,T,P.pgHi);
      fr(x+T-5,y,5,T,P.pgSh);
      fr(x+6,y,T-11,T,P.pg);
      break;}
    case 7:{ // 管身右 3D
      fr(x,y,T,T,P.pg);
      fr(x+T-5,y,5,T,P.pgSh);
      break;}
    case 10:{ // 台阶
      fr(x,y,T,T,P.gMid);
      fr(x,y,T,3,P.gHi);
      fr(x,y,3,T,P.gHi);
      fr(x+T-3,y,3,T,P.gShadow);
      fr(x,y+T-3,T,3,P.gBot);
      break;}
  }
}

function drawLevel(){
  const s=Math.max(0,Math.floor(cam.x/T)-1);
  const e=Math.min(LW-1,s+Math.ceil(SW/T)+3);
  for(let ty=0;ty<LH;ty++)for(let tx=s;tx<=e;tx++)drawTile(tx,ty);
}

function drawMario(){
  const x=sx(M.x),y=M.y;
  const big=M.big,f=M.face;
  if(M.inv>0&&Math.floor(M.inv/3)%2===0)return;

  cx.save();
  if(f===-1){cx.translate(x+M.w/2,0);cx.scale(-1,1);cx.translate(-(x+M.w/2),0);}

  const bx=x,by=y,bw=M.w;

  if(M.dead){
    // 死亡旋转
    cx.save();
    cx.translate(bx+bw/2,by+M.h/2);
    cx.rotate(tick*0.15);
    fr(-bw/2,-M.h/2,bw,M.h/3,P.mR);
    fr(-bw/2,-M.h/6,bw,M.h/3,P.mSk);
    fr(-bw/2,M.h/6,bw,M.h/3,P.mBl);
    cx.restore();
    cx.restore();return;
  }

  if(!big){
    // 小马里奥 (T高)
    // 帽子
    fr(bx+4,by,bw-8,7,P.mR);
    fr(bx+1,by+7,bw-2,5,P.mR);
    fr(bx+1,by+7,3,5,P.mRHi); // 帽子高光
    fr(bx+4,by,3,7,P.mRHi);
    // 脸
    fr(bx+3,by+12,bw-6,9,P.mSk);
    fr(bx+3,by+12,3,9,P.mSkHi);
    // 眼睛
    cx.fillStyle=P.mEy;cx.fillRect(bx+bw-10,by+14,4,4);
    cx.fillStyle=P.mWh;cx.fillRect(bx+bw-11,by+13,2,2);
    // 胡子
    fr(bx+2,by+19,bw-4,3,P.mBr);
    // 身体
    fr(bx+1,by+22,bw-2,9,P.mR);
    fr(bx+1,by+22,3,9,P.mRHi);
    // 背带裤
    fr(bx+3,by+25,bw-6,6,P.mBl);
    fr(bx+3,by+25,3,6,P.mBlHi);
    // 腿
    const lf=M.onG?M.wF:2;
    cx.fillStyle=P.mR;
    if(!M.onG){
      cx.fillRect(bx+1,by+31,10,9);cx.fillRect(bx+bw-11,by+31,10,9);
    } else if(lf===0){
      cx.fillRect(bx+1,by+31,10,9);cx.fillRect(bx+bw-11,by+31,10,9);
    } else if(lf===1){
      cx.fillRect(bx+1,by+31,10,11);cx.fillRect(bx+bw-11,by+31,10,7);
    } else if(lf===2){
      cx.fillRect(bx+2,by+33,8,7);cx.fillRect(bx+bw-10,by+33,8,7);
    } else {
      cx.fillRect(bx+1,by+31,10,7);cx.fillRect(bx+bw-11,by+31,10,11);
    }
    // 鞋子
    cx.fillStyle=P.mBr;
    if(!M.onG){
      cx.fillRect(bx,by+38,12,4);cx.fillRect(bx+bw-12,by+38,12,4);
    } else if(lf===1){
      cx.fillRect(bx,by+40,13,4);cx.fillRect(bx+bw-11,by+36,11,4);
    } else if(lf===3){
      cx.fillRect(bx,by+36,11,4);cx.fillRect(bx+bw-13,by+40,13,4);
    } else {
      cx.fillRect(bx,by+38,12,4);cx.fillRect(bx+bw-12,by+38,12,4);
    }
  } else {
    // 大马里奥 (T*2高)
    fr(bx+4,by,bw-8,10,P.mR);
    fr(bx+1,by+10,bw-2,7,P.mR);
    fr(bx+1,by+10,3,7,P.mRHi);
    fr(bx+4,by,3,10,P.mRHi);
    fr(bx+3,by+17,bw-6,14,P.mSk);
    fr(bx+3,by+17,3,14,P.mSkHi);
    cx.fillStyle=P.mEy;cx.fillRect(bx+bw-11,by+21,5,5);
    cx.fillStyle=P.mWh;cx.fillRect(bx+bw-12,by+20,2,2);
    fr(bx+2,by+29,bw-4,4,P.mBr);
    fr(bx+1,by+33,bw-2,15,P.mR);
    fr(bx+1,by+33,3,15,P.mRHi);
    fr(bx+3,by+37,bw-6,11,P.mBl);
    fr(bx+3,by+37,3,11,P.mBlHi);
    const lf=M.onG?M.wF:2;
    cx.fillStyle=P.mR;
    if(!M.onG){
      cx.fillRect(bx+1,by+48,12,12);cx.fillRect(bx+bw-13,by+48,12,12);
    } else if(lf===0){
      cx.fillRect(bx+1,by+48,12,12);cx.fillRect(bx+bw-13,by+48,12,12);
    } else if(lf===1){
      cx.fillRect(bx+1,by+48,12,15);cx.fillRect(bx+bw-13,by+48,12,9);
    } else if(lf===2){
      cx.fillRect(bx+2,by+50,10,10);cx.fillRect(bx+bw-12,by+50,10,10);
    } else {
      cx.fillRect(bx+1,by+48,12,9);cx.fillRect(bx+bw-13,by+48,12,15);
    }
    cx.fillStyle=P.mBr;
    cx.fillRect(bx,by+58,14,5);cx.fillRect(bx+bw-14,by+58,14,5);
  }
  cx.restore();
}

// =====================================================
// 绘制粒子
// =====================================================
function drawParts(){
  particles.forEach(p=>{
    const a=p.life/p.maxL;
    cx.globalAlpha=a;
    if(p.type==='coin'){
      cx.fillStyle=P.co;
      cx.beginPath();cx.arc(sx(p.x),p.y,T*0.22,0,Math.PI*2);cx.fill();
      cx.fillStyle=P.coHi;
      cx.beginPath();cx.arc(sx(p.x)-2,p.y-2,T*0.08,0,Math.PI*2);cx.fill();
    } else if(p.type==='star'){
      cx.fillStyle=p.col;
      const s=T*0.18*(0.5+a*0.5);
      cx.beginPath();
      for(let i=0;i<5;i++){
        const a2=p.r+i*Math.PI*0.4;
        const a3=p.r+i*Math.PI*0.4+Math.PI*0.2;
        if(i===0)cx.moveTo(sx(p.x)+Math.cos(a2)*s*2,p.y+Math.sin(a2)*s*2);
        else cx.lineTo(sx(p.x)+Math.cos(a2)*s*2,p.y+Math.sin(a2)*s*2);
        cx.lineTo(sx(p.x)+Math.cos(a3)*s,p.y+Math.sin(a3)*s);
      }
      cx.closePath();cx.fill();
    } else {
      cx.fillStyle=p.col;
      cx.fillRect(sx(p.x)-3,p.y-3,6,6);
    }
  });
  cx.globalAlpha=1;
}

  cx.fillStyle='#ffffff';
  cx.font=`${T*0.65}px "Microsoft YaHei",sans-serif`;
  cx.fillText('第 1-1 关',SW/2,SH*0.38);

  // 操作说明框
  cx.fillStyle='rgba(255,255,255,0.08)';
  cx.strokeStyle='rgba(100,180,255,0.4)';cx.lineWidth=1.5;
  cx.beginPath();cx.roundRect(SW*0.15,SH*0.44,SW*0.7,SH*0.36,8);
  cx.fill();cx.stroke();

  cx.fillStyle='#aaddff';
  cx.font=`${T*0.48}px "Microsoft YaHei",sans-serif`;
  const lines=['← → / A D  —  移动','↑ / 空格  —  跳跃（长按跳更高）','Shift / Z  —  加速跑','踩踏消灭敌人，撞击问号块获得道具'];
  lines.forEach((l,i)=>cx.fillText(l,SW/2,SH*0.52+i*T*0.68));

  // 闪烁开始提示
  if(Math.floor(Date.now()/550)%2===0){
    cx.shadowColor='#ffdd00';cx.shadowBlur=15;
    cx.fillStyle='#ffd700';
    cx.font=`bold ${T*0.6}px "Microsoft YaHei",sans-serif`;
    cx.fillText('▶  按 空格键 或 回车 开始游戏',SW/2,SH*0.88);
    cx.shadowBlur=0;
  }
}

function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,SW,SH);
  cx.shadowColor='#ff0000';cx.shadowBlur=25;
  cx.fillStyle='#ff4444';
  cx.font=`bold ${T*1.3}px "Microsoft YaHei",sans-serif`;
  cx.textAlign='center';
  cx.fillText('游 戏 结 束',SW/2,SH/2-T*0.8);
  cx.shadowBlur=0;
  cx.fillStyle='#ffffff';
  cx.font=`${T*0.6}px "Microsoft YaHei",sans-serif`;
  cx.fillText('最终得分：'+score,SW/2,SH/2+T*0.5);
  if(Math.floor(Date.now()/550)%2===0){
    cx.fillStyle='#ffdd00';
    cx.fillText('按 空格键 重新开始',SW/2,SH/2+T*1.8);
  }
}

function drawWin(){
  cx.fillStyle='rgba(0,0,0,0.65)';cx.fillRect(0,0,SW,SH);
  // 烟花粒子效果
  if(tick%3===0){
    for(let i=0;i<3;i++){
      const fx=Math.random()*SW, fy=Math.random()*SH*0.6;
      const col=['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'][Math.floor(Math.random()*5)];
      for(let j=0;j<8;j++){
        const a=(j/8)*Math.PI*2;
        addPart(fx,fy,Math.cos(a)*4,Math.sin(a)*4,col,20,'star');
      }
    }
  }
  cx.shadowColor='#00ff88';cx.shadowBlur=20;
  cx.fillStyle='#ffd700';
  cx.font=`bold ${T*1.1}px "Microsoft YaHei",sans-serif`;
  cx.textAlign='center';
  cx.fillText('关 卡 通 关 ！',SW/2,SH/2-T*0.8);
  cx.shadowBlur=0;
  cx.fillStyle='#ffffff';
  cx.font=`${T*0.6}px "Microsoft YaHei",sans-serif`;
  cx.fillText(`得分：${score}　金币：${coinN}`,SW/2,SH/2+T*0.5);
  if(Math.floor(Date.now()/550)%2===0){
    cx.fillStyle='#00ff88';
    cx.fillText('按 空格键 再玩一次',SW/2,SH/2+T*1.8);
  }
}

// =====================================================
// 主循环
// =====================================================
function startGame(){getAC();resetAll();}

function resetAll(){
  score=0;coinN=0;lives=3;timeL=400;timeA=0;tick=0;
  cam.x=0;particles.length=0;enemies.length=0;
  [22,37,39,50,57,63,78,90,100,110,120,130,140,150,160,170,180].forEach(mkGoomba);
  coins.forEach(c=>c.got=false);
  powerups.length=0;
  Object.keys(qHit).forEach(k=>delete qHit[k]);
  // 恢复地图
  MAP[7][16]=3;MAP[7][19]=9;MAP[7][20]=2;MAP[7][21]=3;MAP[7][22]=2;
  MAP[3][24]=2;MAP[3][25]=2;MAP[3][26]=2;MAP[3][27]=3;MAP[3][28]=2;MAP[3][29]=2;MAP[3][30]=2;
  MAP[7][77]=2;MAP[7][78]=2;MAP[7][79]=2;MAP[7][80]=3;MAP[3][80]=3;
  for(let x=88;x<=197;x++){
    if(x%17===0)MAP[7][x]=3;
    else if(x%11===0)MAP[7][x]=2;
    else if(x%23===0)MAP[3][x]=3;
  }
  M=mkMario();state='playing';
  document.getElementById('score').textContent='000000';
  document.getElementById('coins').textContent='×00';
  document.getElementById('timer').textContent='400';
  document.getElementById('lives').textContent='♥×3';
}

let lastT=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/16.67,3);
  lastT=ts;tick++;

  cx.clearRect(0,0,SW,SH);

  if(state==='title'){drawTitle();return;}

  if(state==='playing'){
    timeA+=dt;
    if(timeA>=40){timeL=Math.max(0,timeL-1);timeA=0;document.getElementById('timer').textContent=Math.ceil(timeL);}
    if(timeL<=0&&!M.dead)killM();
    updMario();updEnemies();updPU();updParts();
  } else {
    updParts();
  }

  drawBG();
  drawLevel();
  drawCoins();
  drawPU();
  enemies.forEach(e=>{if(!e.dead||e.dT>0)drawGoomba(e);});
  drawFlag();
  drawMario();
  drawParts();

  if(state==='gameover')drawGameOver();
  if(state==='win')drawWin();
}

requestAnimationFrame(loop);
</script>
