<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音视频去水印</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
    }
    h1 {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      text-align: center;
      margin-top: 6px;
    }
    .input-group {
      margin-top: 30px;
      position: relative;
    }
    textarea {
      width: 100%;
      padding: 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      resize: none;
      height: 100px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea::placeholder { color: rgba(255,255,255,0.3); }
    textarea:focus { border-color: rgba(255, 71, 87, 0.6); }
    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(255,71,87,0.4); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .status.loading {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
    }
    .status.error {
      display: block;
      background: rgba(255,71,87,0.15);
      border: 1px solid rgba(255,71,87,0.3);
      color: #ff6b81;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result {
      margin-top: 20px;
      display: none;
    }
    .result.show { display: block; }
    .video-info {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .video-title {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .video-meta {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
    .cover-img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 16px;
      max-height: 300px;
      object-fit: cover;
    }
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .download-video {
      background: linear-gradient(135deg, #2ed573, #1e90ff);
      color: #fff;
      border: none;
    }
    .download-video:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,213,115,0.3); }
    .download-music {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
    }
    .download-music:hover { background: rgba(255,255,255,0.12); }
    .tip {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(255,214,0,0.08);
      border: 1px solid rgba(255,214,0,0.2);
      border-radius: 10px;
      color: rgba(255,214,0,0.8);
      font-size: 12px;
      line-height: 1.6;
    }
    .api-selector {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .api-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }
    .api-btn.active {
      background: rgba(255,71,87,0.3);
      border-color: rgba(255,71,87,0.5);
      color: #ff6b81;
    }
    .label {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🎵</span>
    <h1>抖音去水印下载</h1>
    <p class="subtitle">粘贴分享链接，一键获取无水印视频</p>
  </div>

  <div class="input-group">
    <div class="label">视频链接</div>
    <textarea id="urlInput" placeholder="粘贴抖音分享链接或视频链接&#10;例：https://v.douyin.com/xxxxx/ 或复制的分享文字"></textarea>
  </div>

  <div>
    <div class="label" style="margin-top:12px">解析接口</div>
    <div class="api-selector">
      <button class="api-btn active" onclick="selectApi(this, 'douyin.wtf')">接口1</button>
      <button class="api-btn" onclick="selectApi(this, 'api.tikhub.io')">接口2</button>
      <button class="api-btn" onclick="selectApi(this, 'api.douyin.com')">接口3</button>
    </div>
  </div>

  <button class="btn" id="parseBtn" onclick="parse()">🚀 解析视频</button>

  <div class="status loading" id="loading">
    <div class="spinner"></div>
    <span id="loadingText">正在解析中，请稍候...</span>
  </div>
  <div class="status error" id="error"></div>

  <div class="result" id="result">
    <img id="coverImg" class="cover-img" src="" alt="封面" style="display:none">
    <div class="video-info">
      <div class="video-title" id="videoTitle"></div>
      <div class="video-meta" id="videoMeta"></div>
    </div>
    <a id="downloadVideoBtn" class="download-btn download-video" href="#" target="_blank" download>
      📥 下载无水印视频
    </a>
    <a id="downloadMusicBtn" class="download-btn download-music" href="#" target="_blank" download style="display:none">
      🎵 下载背景音乐
    </a>
  </div>

  <div class="tip">
    💡 使用方法：打开抖音 App → 点击分享 → 复制链接 → 粘贴到上方输入框 → 点击解析<br>
    ⚠️ 若某个接口失败，请切换其他接口重试
  </div>
</div>

<script>
  let currentApi = 'douyin.wtf';

  function selectApi(el, api) {
    document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentApi = api;
  }

  function extractUrl(text) {
    const urlMatch = text.match(/https?:\/\/[^\s，,。！!？?]+/);
    return urlMatch ? urlMatch[0] : text.trim();
  }

  async function parse() {
    const raw = document.getElementById('urlInput').value.trim();
    if (!raw) { showError('请输入视频链接'); return; }

    const url = extractUrl(raw);
    if (!url.includes('douyin.com') && !url.includes('iesdouyin.com') && !url.includes('tiktok.com')) {
      showError('请输入有效的抖音/TikTok 链接');
      return;
    }

    showLoading('正在解析中，请稍候...');
    hideResult();

    try {
      let data;
      if (currentApi === 'douyin.wtf') {
        data = await parseWithApi1(url);
      } else if (currentApi === 'api.tikhub.io') {
        data = await parseWithApi2(url);
      } else {
        data = await parseWithApi3(url);
      }
      showResult(data);
    } catch (e) {
      showError('解析失败：' + e.message + '\n请尝试切换其他接口');
    }
  }

  // 接口1: douyin.wtf (免费公开接口)
  async function parseWithApi1(url) {
    const apiUrl = `https://www.douyin.wtf/api?url=${encodeURIComponent(url)}`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.video_url && !json.url) throw new Error(json.msg || '接口返回异常');
    return {
      title: json.title || json.desc || '抖音视频',
      author: json.author || '',
      videoUrl: json.video_url || json.url,
      musicUrl: json.music_url || null,
      cover: json.cover || json.origin_cover || null,
    };
  }

  // 接口2: 备用解析
  async function parseWithApi2(url) {
    const apiUrl = `https://api.douyin.wtf/api?url=${encodeURIComponent(url)}&minimal=true`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.video_url) throw new Error(json.message || '解析失败');
    return {
      title: json.desc || '抖音视频',
      author: json.author?.nickname || '',
      videoUrl: json.video_url,
      musicUrl: json.music?.play_url?.uri || null,
      cover: json.video?.cover?.url_list?.[0] || null,
    };
  }

  // 接口3: 另一备用
  async function parseWithApi3(url) {
    const apiUrl = `https://api.douyin.wtf/api?url=${encodeURIComponent(url)}`;
    const res = await fetch(apiUrl, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const videoUrl = json.video_url || json.nwm_video_url || json.url;
    if (!videoUrl) throw new Error('未获取到视频地址');
    return {
      title: json.title || json.desc || '抖音视频',
      author: json.author || '',
      videoUrl,
      musicUrl: json.music_url || null,
      cover: json.cover || null,
    };
  }

  function showResult(data) {
    hideLoading();
    document.getElementById('videoTitle').textContent = data.title;
    document.getElementById('videoMeta').textContent = data.author ? `@${data.author}` : '';

    if (data.cover) {
      const img = document.getElementById('coverImg');
      img.src = data.cover;
      img.style.display = 'block';
    }

    const videoBtn = document.getElementById('downloadVideoBtn');
    videoBtn.href = data.videoUrl;

    if (data.musicUrl) {
      const musicBtn = document.getElementById('downloadMusicBtn');
      musicBtn.href = data.musicUrl;
      musicBtn.style.display = 'flex';
    }

    document.getElementById('result').classList.add('show');
  }

  function showLoading(msg) {
    document.getElementById('loadingText').textContent = msg;
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('error').style.display = 'none';
    document.getElementById('parseBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('parseBtn').disabled = false;
  }

  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }

  function hideResult() {
    document.getElementById('result').classList.remove('show');
    document.getElementById('coverImg').style.display = 'none';
    document.getElementById('downloadMusicBtn').style.display = 'none';
    document.getElementById('error').style.display = 'none';
  }

  // 支持粘贴后自动提取链接
  document.getElementById('urlInput').addEventListener('paste', (e) => {
    setTimeout(() => {
      const val = document.getElementById('urlInput').value;
      const url = extractUrl(val);
      if (url !== val) document.getElementById('urlInput').value = url;
    }, 50);
  });
</script>
</body>
</html>
