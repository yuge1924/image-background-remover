<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>植物大战僵尸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
#wrap{position:relative;width:920px}
#bar{background:linear-gradient(#3d2b1f,#2a1a0e);border:3px solid #8B6914;border-bottom:none;padding:8px;display:flex;align-items:center;gap:6px;border-radius:8px 8px 0 0}
#sun{background:#111;border:2px solid #f0c040;border-radius:20px;padding:4px 12px;color:#f0c040;font-size:17px;font-weight:bold;min-width:76px;text-align:center}
.pc{width:60px;height:68px;background:linear-gradient(#2d5a1b,#1a3a0a);border:2px solid #4a8a2a;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:.15s}
.pc:hover{border-color:#8aff4a;transform:scale(1.05)}
.pc.sel{border-color:#ff0;box-shadow:0 0 10px #ff0}
.pc.off{opacity:.4;cursor:not-allowed}
.pi{font-size:24px}
.pp{font-size:11px;color:#f0c040;font-weight:bold}
.pn{font-size:9px;color:#aaffaa}
#shovel{width:50px;height:60px;background:linear-gradient(#8B6914,#5a4010);border:2px solid #c8a020;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;margin-left:auto}
#shovel:hover{border-color:#fff}
#shovel.sel{border-color:#ff0;box-shadow:0 0 10px #ff0}
canvas{display:block;border:3px solid #8B6914;border-top:none;border-radius:0 0 8px 8px;cursor:crosshair}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.82);border-radius:0 0 8px 8px;z-index:9}
#ov h1{color:#7fff00;font-size:42px;text-shadow:0 0 20px #7fff00;margin-bottom:14px}
#ov p{color:#ddd;font-size:14px;margin-bottom:26px;text-align:center;line-height:2.1}
#ov button{padding:13px 48px;font-size:19px;background:linear-gradient(#7fff00,#3a9900);border:none;border-radius:30px;cursor:pointer;font-weight:bold;color:#111}
#ov button:hover{transform:scale(1.06)}
#wi{position:absolute;top:6px;right:10px;color:#fff;font-size:13px;background:rgba(0,0,0,.5);padding:3px 10px;border-radius:10px;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="bar">
    <div id="sun">☀️ 150</div>
    <div class="pc" data-t="sunflower"><div class="pi">🌻</div><div class="pp">50</div><div class="pn">向日葵</div></div>
    <div class="pc" data-t="peashooter"><div class="pi">🌿</div><div class="pp">100</div><div class="pn">豌豆射手</div></div>
    <div class="pc" data-t="snowpea"><div class="pi">❄️</div><div class="pp">175</div><div class="pn">寒冰射手</div></div>
    <div class="pc" data-t="wallnut"><div class="pi">🥜</div><div class="pp">50</div><div class="pn">坚果墙</div></div>
    <div class="pc" data-t="cherry"><div class="pi">🍒</div><div class="pp">150</div><div class="pn">樱桃炸弹</div></div>
    <div class="pc" data-t="potatomine"><div class="pi">🥔</div><div class="pp">25</div><div class="pn">土豆地雷</div></div>
    <div class="pc" data-t="chomper"><div class="pi">👾</div><div class="pp">150</div><div class="pn">大嘴花</div></div>
    <div id="shovel" title="铲子">🪣</div>
  </div>
  <canvas id="c" width="920" height="500"></canvas>
  <div id="wi">第 1 波</div>
  <div id="ov">
    <h1>🌻 植物大战僵尸</h1>
    <p>选择植物种在草坪上，阻止僵尸到达家园！<br>点击掉落的阳光收集资源<br>🌻向日葵产阳光 | 🌿豌豆射手攻击 | 🥜坚果墙防御<br>❄️寒冰射手减速 | 🍒樱桃炸弹范围爆炸 | 🥔土豆地雷</p>
    <button id="startBtn">开始游戏</button>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const COLS=9,ROWS=5,CW=90,CH=90,GX=80,GY=10;
let sunVal=150,wave=1,running=false;
let selPlant=null,useShovel=false;
let plants=[],zombies=[],bullets=[],drops=[],exps=[],parts=[];
let lastT=0,sunTmr=0,waveTmr=0,zQueue=[],waveGoing=false,waveDelay=0;

const PD={
  sunflower: {cost:50,hp:300,name:'向日葵',icon:'🌻',sunRate:3500,color:'#f0c040'},
  peashooter:{cost:100,hp:300,name:'豌豆射手',icon:'🌿',fireRate:1500,dmg:20,color:'#4a8a2a'},
  snowpea:   {cost:175,hp:300,name:'寒冰射手',icon:'❄️',fireRate:1500,dmg:20,slow:true,color:'#80d0ff'},
  wallnut:   {cost:50,hp:4000,name:'坚果墙',icon:'🥜',color:'#c8a020'},
  cherry:    {cost:150,hp:100,name:'樱桃炸弹',icon:'🍒',explodeDelay:1500,dmg:1800,range:1.5,color:'#ff4040'},
  potatomine:{cost:25,hp:100,name:'土豆地雷',icon:'🥔',armDelay:15000,dmg:1800,color:'#8B6914'},
  chomper:   {cost:150,hp:600,name:'大嘴花',icon:'👾',eatRate:4000,dmg:9999,color:'#9040ff'},
};
const ZD={
  normal:{hp:200,spd:.15,dmg:1,armor:0,name:'普通僵尸',hat:null,big:false},
  cone:  {hp:370,spd:.15,dmg:1,armor:200,name:'路障僵尸',hat:'🚧',big:false},
  bucket:{hp:700,spd:.15,dmg:1,armor:600,name:'铁桶僵尸',hat:'🪣',big:false},
  flag:  {hp:200,spd:.15,dmg:1,armor:0,name:'旗帜僵尸',hat:'🚩',big:false},
  runner:{hp:150,spd:.35,dmg:1,armor:0,name:'快速僵尸',hat:null,big:false},
  giant: {hp:2000,spd:.1,dmg:3,armor:0,name:'巨人僵尸',hat:null,big:true},
};

function cc(col,row){return{x:GX+col*CW+CW/2,y:GY+row*CH+CH/2};}
function gc(x,y){return{col:Math.floor((x-GX)/CW),row:Math.floor((y-GY)/CH)};}

function updateSunUI(){
  document.getElementById('sun').textContent='☀️ '+sunVal;
  document.querySelectorAll('.pc').forEach(c=>{
    const d=PD[c.dataset.t];
    c.classList.toggle('off',d&&sunVal<d.cost);
  });
}

function spawnDrop(x,y){
  drops.push({x:x||GX+Math.random()*COLS*CW,y:y||20,vy:.8+Math.random()*.5,ty:GY+Math.random()*ROWS*CH,life:600});
}
function spawnParts(x,y,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*3;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col});}
}

function buildWave(w){
  const q=[],cnt=5+w*3;
  for(let i=0;i<cnt;i++){
    let t='normal';const r=Math.random();
    if(w>=2&&r<.2)t='cone';
    if(w>=3&&r<.12)t='bucket';
    if(w>=4&&r<.1)t='runner';
    if(w>=5&&r<.05)t='giant';
    if(i===Math.floor(cnt/2))t='flag';
    q.push({t,delay:i*(1200-Math.min(w*50,700)),row:Math.floor(Math.random()*ROWS)});
  }
  return q;
}

function spawnZ(type,row){
  const d=ZD[type];
  zombies.push({type,row,x:GX+COLS*CW+60,y:GY+row*CH+CH/2,
    hp:d.hp,maxHp:d.hp,armor:d.armor,maxArmor:d.armor,
    spd:d.spd,dmg:d.dmg,hat:d.hat,big:d.big,
    eating:false,slowTmr:0,dead:false,anim:0});
  if(type==='flag'){for(let i=0;i<3;i++)spawnZ('normal',Math.floor(Math.random()*ROWS));}
}

// card clicks
document.querySelectorAll('.pc').forEach(c=>{
  c.addEventListener('click',()=>{
    if(!running)return;
    useShovel=false;document.getElementById('shovel').classList.remove('sel');
    const t=c.dataset.t;
    if(selPlant===t){selPlant=null;document.querySelectorAll('.pc').forEach(x=>x.classList.remove('sel'));return;}
    selPlant=t;
    document.querySelectorAll('.pc').forEach(x=>x.classList.toggle('sel',x.dataset.t===t));
  });
});
document.getElementById('shovel').addEventListener('click',()=>{
  if(!running)return;
  selPlant=null;document.querySelectorAll('.pc').forEach(c=>c.classList.remove('sel'));
  useShovel=!useShovel;document.getElementById('shovel').classList.toggle('sel',useShovel);
});

cv.addEventListener('click',e=>{
  if(!running)return;
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  // collect drops
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(Math.hypot(mx-d.x,my-d.y)<26){sunVal+=25;drops.splice(i,1);updateSunUI();return;}
  }
  const{col,row}=gc(mx,my);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  if(useShovel){
    const idx=plants.findIndex(p=>p.col===col&&p.row===row);
    if(idx>=0){spawnParts(plants[idx].x,plants[idx].y,'#8B6914',8);plants.splice(idx,1);}
    return;
  }
  if(!selPlant)return;
  if(plants.find(p=>p.col===col&&p.row===row))return;
  const pd=PD[selPlant];
  if(sunVal<pd.cost)return;
  sunVal-=pd.cost;updateSunUI();
  const{x,y}=cc(col,row);
  const p={type:selPlant,col,row,x,y,hp:pd.hp,maxHp:pd.hp,tmr:0,
    armed:selPlant!=='potatomine',eating:false,eatTmr:0,
    exploding:selPlant==='cherry',explodeTmr:0};
  plants.push(p);spawnParts(x,y,pd.color,6);
});

function startGame(){
  document.getElementById('ov').style.display='none';
  running=true;sunVal=150;wave=1;
  plants=[];zombies=[];bullets=[];drops=[];exps=[];parts=[];
  zQueue=buildWave(wave);waveGoing=true;waveDelay=0;waveTmr=0;
  updateSunUI();
  document.getElementById('wi').textContent='第 1 波';
  lastT=performance.now();
  requestAnimationFrame(loop);
}
document.getElementById('startBtn').addEventListener('click',startGame);

function loop(ts){
  if(!running)return;
  const dt=Math.min(ts-lastT,50);lastT=ts;
  update(dt);draw();
  requestAnimationFrame(loop);
}

function update(dt){
  sunTmr+=dt;
  if(sunTmr>4000){sunTmr=0;spawnDrop();}

  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(d.y<d.ty)d.y+=d.vy*dt*.06*60;
    else{sunVal+=25;drops.splice(i,1);updateSunUI();continue;}
    d.life-=dt*.2;
    if(d.life<=0){sunVal+=25;drops.splice(i,1);updateSunUI();}
  }

  if(waveGoing&&zQueue.length>0){
    waveDelay+=dt;
    while(zQueue.length>0&&waveDelay>=zQueue[0].delay){const z=zQueue.shift();spawnZ(z.t,z.row);}
    if(zQueue.length===0)waveGoing=false;
  }
  if(!waveGoing&&zombies.length===0){
    waveTmr+=dt;
    if(waveTmr>5000){waveTmr=0;wave++;
      document.getElementById('wi').textContent='第 '+wave+' 波';
      zQueue=buildWave(wave);waveGoing=true;waveDelay=0;}
  }

  for(const p of plants){
    p.tmr+=dt;
    const pd=PD[p.type];
    if(p.type==='sunflower'&&p.tmr>=pd.sunRate){p.tmr=0;spawnDrop(p.x,p.y);}
    if((p.type==='peashooter'||p.type==='snowpea')&&p.tmr>=pd.fireRate){
      if(zombies.some(z=>z.row===p.row&&z.x>p.x&&!z.dead)){
        p.tmr=0;
        bullets.push({x:p.x,y:p.y,row:p.row,spd:5,dmg:pd.dmg,slow:pd.slow||false,col:pd.slow?'#80d0ff':'#4aff4a'});
      }
    }
    if(p.type==='cherry'&&p.exploding){
      p.explodeTmr+=dt;
      if(p.explodeTmr>=pd.explodeDelay){
        exps.push({x:p.x,y:p.y,r:0,maxR:CW*pd.range*2,life:1});
        spawnParts(p.x,p.y,'#ff8040',20);
        zombies.forEach(z=>{if(Math.hypot(z.x-p.x,z.y-p.y)<CW*pd.range*2){z.hp-=pd.dmg;if(z.hp<=0)z.dead=true;}});
        p.hp=0;
      }
    }
    if(p.type==='potatomine'){
      if(!p.armed){p.tmr+=dt;if(p.tmr>=pd.armDelay)p.armed=true;}
      if(p.armed){
        for(const z of zombies){
          if(z.row===p.row&&Math.abs(z.x-p.x)<CW*.6){
            exps.push({x:p.x,y:p.y,r:0,maxR:CW*1.5,life:1});
            spawnParts(p.x,p.y,'#c8a020',15);
            z.hp-=pd.dmg;if(z.hp<=0)z.dead=true;p.hp=0;break;
          }
        }
      }
    }
    if(p.type==='chomper'&&!p.eating){
      const t=zombies.find(z=>z.row===p.row&&z.x>p.x&&z.x<p.x+CW*1.2&&!z.dead);
      if(t&&p.tmr>=pd.eatRate){p.tmr=0;p.eating=true;p.eatTmr=3000;t.dead=true;spawnParts(t.x,t.y,'#9040ff',12);}
    }
    if(p.type==='chomper'&&p.eating){p.eatTmr-=dt;if(p.eatTmr<=0)p.eating=false;}
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.spd*dt*.06*60;
    if(b.x>GX+COLS*CW+60){bullets.splice(i,1);continue;}
    let hit=false;
    for(const z of zombies){
      if(!z.dead&&z.row===b.row&&Math.abs(z.x-b.x)<20){
        z.hp-=b.dmg;if(b.slow)z.slowTmr=3000;if(z.hp<=0)z.dead=true;
        spawnParts(b.x,b.y,b.col,4);hit=true;break;
      }
    }
    if(hit)bullets.splice(i,1);
  }

  for(const z of zombies){
    if(z.dead)continue;
    z.anim+=dt*.005;
    if(z.slowTmr>0)z.slowTmr-=dt;
    const spd=z.slowTmr>0?z.spd*.5:z.spd;
    const tgt=plants.find(p=>p.row===z.row&&Math.abs(p.x-z.x)<CW*.6&&p.hp>0);
    if(tgt){z.eating=true;tgt.hp-=z.dmg*dt*.01;if(tgt.hp<=0){tgt.hp=0;spawnParts(tgt.x,tgt.y,'#ff4040',8);}}
    else{z.eating=false;z.x-=spd*dt*.06;}
    if(z.x<GX-30){
      running=false;
      const ov=document.getElementById('ov');
      ov.innerHTML='<h1 style="color:#ff4040">🧟 游戏结束</h1><p style="color:#ddd">僵尸到达了你的家！<br>坚持到第 '+wave+' 波</p><button class="startBtn" id="startBtn">再来一局</button>';
      ov.style.display='flex';
      document.getElementById('startBtn').addEventListener('click',startGame);
      return;
    }
  }

  plants=plants.filter(p=>p.hp>0);
  zombies=zombies.filter(z=>!z.dead);
  for(let i=exps.length-1;i>=0;i--){const e=exps[i];e.r+=8;e.life-=.04;if(e.life<=0)exps.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.03;if(p.life<=0)parts.splice(i,1);}
}

function draw(){
  ctx.clearRect(0,0,920,500);
  // sky
  const sk=ctx.createLinearGradient(0,0,0,500);
  sk.addColorStop(0,'#87ceeb');sk.addColorStop(1,'#c8e8a0');
  ctx.fillStyle=sk;ctx.fillRect(0,0,920,500);
  // grid
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.fillStyle=(r+c)%2===0?'rgba(60,140,20,1)':'rgba(40,105,10,1)';
    ctx.fillRect(GX+c*CW,GY+r*CH,CW,CH);
    ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;
    ctx.strokeRect(GX+c*CW,GY+r*CH,CW,CH);
  }
  // house
  ctx.fillStyle='rgba(139,90,43,.3)';ctx.fillRect(0,GY,GX,ROWS*CH);
  ctx.font='38px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🏠',GX/2,GY+ROWS*CH/2);
  // danger zone
  ctx.fillStyle='rgba(200,50,50,.08)';ctx.fillRect(GX+COLS*CW,GY,920-GX-COLS*CW,ROWS*CH);

  // plants
  for(const p of plants){
    const pd=PD[p.type];
    ctx.save();ctx.translate(p.x,p.y);
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,28,22,7,0,0,Math.PI*2);ctx.fill();
    const sz=p.type==='wallnut'?50:42;
    ctx.font=sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(p.type==='potatomine'&&!p.armed)ctx.globalAlpha=.5;
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fill();
    ctx.fillText(pd.icon,0,0);ctx.globalAlpha=1;
    if(p.type==='cherry'&&p.exploding){
      const pct=p.explodeTmr/PD.cherry.explodeDelay;
      ctx.fillStyle='rgba(255,'+(Math.floor(255*(1-pct)))+',0,.9)';
      ctx.font='bold 11px sans-serif';ctx.fillText(((PD.cherry.explodeDelay-p.explodeTmr)/1000).toFixed(1)+'s',0,-32);
    }
    if(p.hp<p.maxHp){
      const bw=44,bh=5,bx=-22,by=-36,pct=p.hp/p.maxHp;
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=pct>.5?'#4aff4a':pct>.25?'#ffaa00':'#ff4040';
      ctx.fillRect(bx,by,bw*pct,bh);
    }
    ctx.restore();
  }

  // bullets
  for(const b of bullets){
    ctx.save();ctx.fillStyle=b.col;ctx.shadowColor=b.col;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,6,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // zombies
  for(const z of zombies){
    if(z.dead)continue;
    ctx.save();ctx.translate(z.x,z.y);
    const sc=z.big?1.6:1;ctx.scale(sc,sc);
    const bob=z.eating?0:Math.sin(z.anim)*3;
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,30,18,6,0,0,Math.PI*2);ctx.fill();
    if(z.slowTmr>0){ctx.fillStyle='rgba(100,180,255,.15)';ctx.beginPath();ctx.ellipse(0,0,22,30,0,0,Math.PI*2);ctx.fill();}
    ctx.font='36px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='rgba(80,120,60,0.75)';ctx.beginPath();ctx.arc(0,bob,20,0,Math.PI*2);ctx.fill();
    ctx.fillText('🧟',0,bob);
    if(z.hat){ctx.font='20px serif';ctx.fillText(z.hat,0,bob-26);}
    if(z.flag){ctx.font='16px serif';ctx.fillText('🚩',-18,bob-28);}
    // hp bar
    const bw=40,bh=4,bx=-20,by=-42,pct=z.hp/z.maxHp;
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=pct>.5?'#4aff4a':pct>.25?'#ffaa00':'#ff4040';
    ctx.fillRect(bx,by,bw*pct,bh);
    if(z.maxArmor>0&&z.armor>0){
      ctx.fillStyle='#888';ctx.fillRect(bx,by+5,bw,3);
      ctx.fillStyle='#aaa';ctx.fillRect(bx,by+5,bw*(z.armor/z.maxArmor),3);
    }
    ctx.restore();
  }

  // sun drops
  for(const d of drops){
    ctx.save();ctx.globalAlpha=Math.min(1,d.life/100);
    ctx.fillStyle='rgba(255,220,0,0.9)';ctx.beginPath();ctx.arc(d.x,d.y,14,0,Math.PI*2);ctx.fill();
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('☀️',d.x,d.y);ctx.restore();
  }

  // explosions
  for(const e of exps){
    ctx.save();ctx.globalAlpha=e.life*.6;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
    g.addColorStop(0,'rgba(255,255,100,.9)');g.addColorStop(.5,'rgba(255,120,0,.6)');g.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // particles
  for(const p of parts){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.restore();
  }
}
</script>
</body>
</html>
